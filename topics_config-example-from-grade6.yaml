# ============================================================================
# US STATES — All 50 states with optional customizations
# ============================================================================
# - name:       Display name (used in book titles and headers)
# - additional: List of additional topic IDs this state includes
# - modified:   List of core topic IDs that use modified versions
#               (file loaded from topics_modified/ instead of topics/)
#
# File slugs must match the 'file' field defined in chapters or
# additional_topics above.  Using full slugs rather than bare IDs
# makes each entry self-documenting and allows future per-state
# variants of the same topic.
#
# States with NO additional or modified fields use the pure CCSS curriculum.
#
# Verified profiles (11 states with modifications):
#   AK  — Alaska GL (CCSS base + integer context, data displays)
#   CO  — CAS 2020 (personal financial literacy, budgeting & saving)
#   FL  — B.E.S.T. 2023 (integer ops, financial literacy, probability, stem-and-leaf)
#   GA  — Georgia K-12 2023 (probability)
#   IN  — IAS 2023 (probability, data displays, transformations, circles)
