    # Chapter 3: Expressions and Equations (Days 14–20)
    - day: 14
      file: day-14-exponents-and-order-of-operations
      topics: [ch03-01]
    - day: 15
      file: day-15-translating-words-and-identifying-parts
      topics: [ch03-02, ch03-03]
    - day: 16
      file: day-16-evaluating-and-equivalent-expressions
      topics: [ch03-04, ch03-05]
    - day: 17
      file: day-17-variables-in-real-world-problems
      topics: [ch03-06]
    - day: 18
